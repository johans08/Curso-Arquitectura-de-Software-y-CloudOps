services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_password123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.Api
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=CloudOpsCourseDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True"
    ports:
      - "8080:8080"
    depends_on:
      - sqlserver

volumes:
  sqlserver_data:
