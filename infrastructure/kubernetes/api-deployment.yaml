apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudops-api
  template:
    metadata:
      labels:
        app: cloudops-api
    spec:
      containers:
        - name: api
          image: ghcr.io/OWNER/cloudops-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: cloudops-secrets
                  key: sql-connection
---
apiVersion: v1
kind: Service
metadata:
  name: cloudops-api
spec:
  selector:
    app: cloudops-api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
